<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Legal – Agenda del Día</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #B8860B;
      --gold-light: #D4A017;
      --gold-pale:  #FFF8E1;
      --dark:       #1C1C1E;
      --sidebar-bg: #F7F7F7;
      --border:     #E0E0E0;
      --text:       #333;
      --muted:      #888;
      --white:      #FFFFFF;
      --pending:    #B8860B;
      --active:     #D4A017;
      --closed:     #555;
      --shadow:     0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #EFEFEF;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--dark);
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .hamburger { cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
    .hamburger span { display: block; width: 20px; height: 2px; background: #ccc; border-radius: 2px; }
    .topbar-logo {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 1.1rem;
      letter-spacing: .5px;
    }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .topbar-user { color: #ccc; font-size: .85rem; }
    .btn-salir {
      background: none; border: 1px solid #555; color: #ccc;
      padding: 4px 12px; border-radius: 4px; cursor: pointer;
      font-size: .8rem; font-family: 'DM Sans', sans-serif;
      transition: border-color .2s, color .2s;
    }
    .btn-salir:hover { border-color: var(--gold); color: var(--gold); }

    /* ── LAYOUT ── */
    .layout { display: flex; flex: 1; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 210px;
      background: var(--white);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: width .3s;
      overflow: hidden;
    }
    .sidebar.collapsed { width: 0; padding: 0; }
    .sidebar-section {
      padding: 6px 16px 2px;
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-top: 8px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px;
      color: #555; font-size: .88rem;
      cursor: pointer; border-left: 3px solid transparent;
      transition: all .15s; text-decoration: none; white-space: nowrap;
    }
    .nav-item:hover { background: var(--gold-pale); color: var(--gold); border-left-color: var(--gold); }
    .nav-item.active { background: var(--gold-pale); color: var(--gold); border-left-color: var(--gold); font-weight: 600; }
    .nav-icon { font-size: 1rem; width: 18px; text-align: center; }

    /* ── MAIN ── */
    .main {
      flex: 1;
      padding: 36px 40px;
      overflow-y: auto;
    }

    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 32px; }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--dark);
      font-weight: 600;
    }
    .page-subtitle { color: var(--muted); font-size: .95rem; margin-top: 4px; }

    /* ── CONTENT GRID ── */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 28px;
      align-items: start;
    }

    /* ── AGENDA TABLE ── */
    .card {
      background: var(--white);
      border-radius: 10px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-weight: 600; font-size: .9rem; color: var(--dark); }
    .badge {
      background: var(--gold-pale); color: var(--gold);
      font-size: .75rem; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
    }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #FAFAFA;
      padding: 10px 16px;
      text-align: left;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid #F3F3F3;
      transition: background .12s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--gold-pale); }
    tbody td { padding: 12px 16px; font-size: .875rem; color: var(--text); }
    .td-aseg { font-weight: 600; color: var(--gold); }
    .td-juz { font-size: .8rem; color: var(--muted); }

    .empty-row td {
      text-align: center; padding: 40px;
      color: var(--muted); font-style: italic;
    }

    /* ── CALENDAR ── */
    .calendar { background: var(--white); border-radius: 10px; box-shadow: var(--shadow); padding: 20px; }
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .cal-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 600; }
    .cal-nav {
      background: none; border: none; cursor: pointer;
      color: var(--gold); font-size: 1.1rem; padding: 4px 8px;
      border-radius: 4px; transition: background .15s;
    }
    .cal-nav:hover { background: var(--gold-pale); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day-name {
      text-align: center; font-size: .72rem; font-weight: 600;
      color: var(--muted); padding: 4px 0; text-transform: uppercase;
    }
    .cal-day {
      text-align: center; padding: 7px 4px;
      font-size: .85rem; border-radius: 6px;
      cursor: pointer; transition: all .15s;
      color: var(--text);
    }
    .cal-day:hover { background: var(--gold-pale); color: var(--gold); }
    .cal-day.other-month { color: #CCC; }
    .cal-day.today {
      background: var(--gold); color: white;
      font-weight: 700; border-radius: 50%;
    }
    .cal-day.selected { background: var(--gold-pale); color: var(--gold); font-weight: 600; }
    .cal-day.sunday { color: #E57373; }
    .cal-day.today.sunday { color: white; }

    /* ── STATS ── */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
    .stat-card {
      border-radius: 10px; padding: 18px 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: transform .15s, box-shadow .15s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
    .stat-card.pending  { background: var(--pending); }
    .stat-card.active   { background: var(--active); }
    .stat-card.closed   { background: var(--closed); }
    .stat-icon { font-size: 1.6rem; opacity: .9; }
    .stat-label { color: rgba(255,255,255,.85); font-size: .75rem; text-transform: uppercase; letter-spacing: .5px; }
    .stat-number { color: white; font-size: 1.8rem; font-weight: 700; line-height: 1; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 32px; right: 32px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--gold); color: white;
      font-size: 1.6rem; border: none; cursor: pointer;
      box-shadow: 0 4px 16px rgba(184,134,11,.45);
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, box-shadow .15s;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(184,134,11,.55); }

    /* ── LOADING SPINNER ── */
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid var(--border); border-top-color: var(--gold);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 12px; padding: 28px;
      width: 480px; max-width: 94vw; box-shadow: 0 20px 60px rgba(0,0,0,.2);
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 20px; color: var(--dark); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
    .form-group input, .form-group select {
      width: 100%; border: 1px solid var(--border); border-radius: 6px;
      padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: .9rem;
      color: var(--dark); outline: none; transition: border-color .15s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--gold); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn { padding: 9px 20px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: .88rem; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
    .btn-primary { background: var(--gold); color: white; }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-secondary { background: #F0F0F0; color: #555; }
    .btn-secondary:hover { background: #E0E0E0; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 96px; right: 32px;
      background: var(--dark); color: white;
      padding: 12px 20px; border-radius: 8px; font-size: .85rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      transform: translateY(20px); opacity: 0;
      transition: all .3s; pointer-events: none; z-index: 300;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid #4CAF50; }
    .toast.error   { border-left: 3px solid #E53935; }

    @media (max-width: 768px) {
      .content-grid { grid-template-columns: 1fr; }
      .main { padding: 20px; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="hamburger" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </div>
    <span class="topbar-logo">⚖ LexAgenda</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-user" id="userName">Lic. Juan Pérez</span>
    <button class="btn-salir">⇥ Salir</button>
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <a class="nav-item active" href="#"><span class="nav-icon">🏠</span> Inicio</a>
    <a class="nav-item" href="#"><span class="nav-icon">📁</span> Expedientes</a>
    <div class="sidebar-section">Reportes</div>
    <a class="nav-item" href="#"><span class="nav-icon">📄</span> Reportes</a>
    <div class="sidebar-section">Configuración</div>
    <a class="nav-item" href="#"><span class="nav-icon">🏢</span> Aseguradora</a>
    <a class="nav-item" href="#"><span class="nav-icon">👤</span> Usuarios</a>
    <a class="nav-item" href="#"><span class="nav-icon">🏛</span> Juzgado</a>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Agenda del día</h1>
      <p class="page-subtitle" id="fechaHoy"></p>
    </div>

    <div class="content-grid">

      <!-- TABLA AGENDA -->
      <div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">Audiencias programadas</span>
            <span class="badge" id="totalAudiencias">cargando…</span>
          </div>
          <table>
            <thead>
              <tr>
                <th>Aseguradora</th>
                <th>Cliente</th>
                <th>Juzgado / Sede</th>
              </tr>
            </thead>
            <tbody id="tablaBody">
              <tr><td colspan="3" style="text-align:center;padding:30px"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>

        <!-- STATS -->
        <div class="stats">
          <div class="stat-card pending">
            <div class="stat-icon">📋</div>
            <div>
              <div class="stat-label">Pendientes</div>
              <div class="stat-number" id="statPendiente">—</div>
            </div>
          </div>
          <div class="stat-card active">
            <div class="stat-icon">📂</div>
            <div>
              <div class="stat-label">En curso</div>
              <div class="stat-number" id="statCurso">—</div>
            </div>
          </div>
          <div class="stat-card closed">
            <div class="stat-icon">🗜</div>
            <div>
              <div class="stat-label">Cerrados</div>
              <div class="stat-number" id="statCerrado">—</div>
            </div>
          </div>
        </div>
      </div>

      <!-- CALENDARIO -->
      <div class="calendar">
        <div class="cal-header">
          <button class="cal-nav" id="btnPrev">&#8249;</button>
          <span class="cal-title" id="calTitle"></span>
          <button class="cal-nav" id="btnNext">&#8250;</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

    </div>
  </main>
</div>

<!-- FAB -->
<button class="fab" onclick="abrirModal()" title="Nueva audiencia">+</button>

<!-- MODAL NUEVA AUDIENCIA -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 class="modal-title">Nueva Audiencia</h2>
    <div class="form-group">
      <label>Expediente ID</label>
      <input type="number" id="fExpediente" placeholder="Ej: 1"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="fFecha"/>
      </div>
      <div class="form-group">
        <label>Hora</label>
        <input type="time" id="fHora"/>
      </div>
    </div>
    <div class="form-group">
      <label>Lugar</label>
      <input type="text" id="fLugar" placeholder="Ej: Juzgado 5to (Pedregal)"/>
    </div>
    <div class="form-group">
      <label>Tipo de Audiencia</label>
      <input type="text" id="fTipo" placeholder="Ej: Audiencia Inicial"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarAudiencia()">Guardar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ── UTILIDADES ─────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function showToast(msg, tipo = 'success') {
    const t = $('toast');
    t.textContent = msg;
    t.className = `toast ${tipo} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function formatFecha(d) {
    const dias  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
  }

  // ── SIDEBAR TOGGLE ──────────────────────────────────────────
  function toggleSidebar() {
    $('sidebar').classList.toggle('collapsed');
  }

  // ── FECHA ───────────────────────────────────────────────────
  const hoy = new Date();
  $('fechaHoy').textContent = formatFecha(hoy);

  // ── AGENDA DEL DÍA ──────────────────────────────────────────
  async function cargarAgenda(fecha) {
    const dateStr = fecha
      ? `${fecha.getFullYear()}-${String(fecha.getMonth()+1).padStart(2,'0')}-${String(fecha.getDate()).padStart(2,'0')}`
      : null;

    const url = dateStr
      ? `/api/audiencias?fecha=${dateStr}`
      : '/api/audiencias/hoy';

    const tbody = $('tablaBody');
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:30px"><div class="spinner"></div></td></tr>';

    try {
      const res  = await fetch(url);
      const json = await res.json();
      const rows = json.data || [];

      $('totalAudiencias').textContent = `${rows.length} audiencias`;

      if (rows.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="3">Sin audiencias para este día</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(a => `
        <tr>
          <td class="td-aseg">${a.aseguradora || '—'}</td>
          <td>${a.cliente_nombre || '—'}</td>
          <td class="td-juz">${a.juzgado || a.lugar || '—'}</td>
        </tr>
      `).join('');
    } catch {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="3">Error al conectar con el servidor</td></tr>';
      showToast('No se pudo conectar con la API', 'error');
    }
  }

  // ── DASHBOARD STATS ─────────────────────────────────────────
  async function cargarStats() {
    try {
      const res  = await fetch('/api/dashboard');
      const json = await res.json();
      const exp  = json.data?.expedientes || {};
      $('statPendiente').textContent = exp.pendientes ?? '—';
      $('statCurso').textContent     = exp.en_curso   ?? '—';
      $('statCerrado').textContent   = exp.cerrados   ?? '—';
    } catch { /* silencioso */ }
  }

  // ── CALENDARIO ──────────────────────────────────────────────
  let calYear  = hoy.getFullYear();
  let calMonth = hoy.getMonth();
  let selectedDate = null;

  const MESES = ['January','February','March','April','May','June',
                 'July','August','September','October','November','December'];

  function renderCalendar() {
    $('calTitle').textContent = `${MESES[calMonth]} ${calYear}`;
    const grid = $('calGrid');
    grid.innerHTML = '';

    // Cabecera días
    ['S','M','T','W','T','F','S'].forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-name';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const daysInPrev  = new Date(calYear, calMonth, 0).getDate();

    // Días mes anterior
    for (let i = firstDay - 1; i >= 0; i--) {
      addDay(grid, daysInPrev - i, true, false);
    }
    // Días mes actual
    for (let d = 1; d <= daysInMonth; d++) {
      const isToday = d === hoy.getDate() && calMonth === hoy.getMonth() && calYear === hoy.getFullYear();
      const isSel   = selectedDate && d === selectedDate.getDate() &&
                      calMonth === selectedDate.getMonth() && calYear === selectedDate.getFullYear();
      const isSun   = new Date(calYear, calMonth, d).getDay() === 0;
      addDay(grid, d, false, isToday, isSel, isSun, () => {
        selectedDate = new Date(calYear, calMonth, d);
        $('fechaHoy').textContent = formatFecha(selectedDate);
        cargarAgenda(selectedDate);
        renderCalendar();
      });
    }
    // Días mes siguiente
    const total = firstDay + daysInMonth;
    const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let d = 1; d <= remaining; d++) {
      addDay(grid, d, true, false);
    }
  }

  function addDay(grid, num, otherMonth, isToday, isSel, isSun, onClick) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    if (otherMonth) el.classList.add('other-month');
    if (isToday)    el.classList.add('today');
    if (isSel && !isToday) el.classList.add('selected');
    if (isSun && !otherMonth) el.classList.add('sunday');
    el.textContent = num;
    if (onClick) el.addEventListener('click', onClick);
    grid.appendChild(el);
  }

  $('btnPrev').addEventListener('click', () => {
    calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
  });
  $('btnNext').addEventListener('click', () => {
    calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
  });

  // ── MODAL ───────────────────────────────────────────────────
  function abrirModal() {
    const hoyStr = hoy.toISOString().split('T')[0];
    $('fFecha').value = hoyStr;
    $('modal').classList.add('open');
  }
  function cerrarModal() { $('modal').classList.remove('open'); }
  $('modal').addEventListener('click', e => { if (e.target === $('modal')) cerrarModal(); });

  async function guardarAudiencia() {
    const body = {
      expediente_id: parseInt($('fExpediente').value),
      fecha:         $('fFecha').value,
      hora:          $('fHora').value,
      lugar:         $('fLugar').value,
      tipo:          $('fTipo').value,
    };
    if (!body.expediente_id || !body.fecha || !body.hora) {
      showToast('Completa los campos obligatorios', 'error'); return;
    }
    try {
      const res = await fetch('/api/audiencias', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const json = await res.json();
      if (res.ok) {
        showToast('Audiencia creada correctamente', 'success');
        cerrarModal();
        cargarAgenda(selectedDate);
        cargarStats();
      } else {
        showToast(json.message || 'Error al guardar', 'error');
      }
    } catch {
      showToast('Error de conexión', 'error');
    }
  }

  // ── INIT ────────────────────────────────────────────────────
